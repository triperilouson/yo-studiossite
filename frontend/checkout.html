<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>YO — CHECKOUT</title>
    <link rel="stylesheet" href="shop.css">
</head>
<body>
    <main class="account-page checkout-page">
        <a class="quiet-link" href="cart.html">← CART</a>
        <h1>CHECKOUT</h1>
        <section class="account-section">
            <h2>ORDER</h2>
            <div id="checkout-cart"></div>
            <div id="checkout-total" class="cart-total"></div>
        </section>
        <section class="account-section">
            <h2>CONTACT DETAILS</h2>
            <form id="checkout-contact" class="yo-form compact-form">
                <label>FIRST NAME<input name="firstName" required maxlength="80" autocomplete="given-name"></label>
                <label>LAST NAME<input name="lastName" required maxlength="80" autocomplete="family-name"></label>
                <label>EMAIL<input name="email" type="email" required maxlength="254" autocomplete="email"></label>
                <label>PHONE<input name="phone" type="tel" required maxlength="20" autocomplete="tel" pattern="\+?[0-9 ()-]{7,20}"></label>
            </form>
        </section>
        <section class="account-section">
            <h2>FULFILMENT</h2>
            <div class="fulfilment-tabs">
                <label class="address-choice"><input type="radio" name="shipping-method" value="DELIVERY" checked> DELIVERY</label>
                <label class="address-choice"><input type="radio" name="shipping-method" value="PICKUP"> PICKUP</label>
            </div>
            <div id="delivery-panel">
                <div id="checkout-addresses" class="address-list"></div>
                <form id="delivery-address-form" class="yo-form compact-form checkout-address-form">
                    <label>COUNTRY<select name="country" required autocomplete="shipping country"></select></label>
                    <label>CITY<input name="city" required maxlength="120" autocomplete="shipping address-level2"></label>
                    <label>POSTAL CODE<input name="postalCode" required minlength="2" maxlength="30" autocomplete="shipping postal-code"></label>
                    <label>STATE / REGION<input name="state" maxlength="120" autocomplete="shipping address-level1"></label>
                    <label class="full-field">ADDRESS LINE 1<input name="line1" required minlength="2" maxlength="200" autocomplete="shipping address-line1"></label>
                    <label class="full-field">ADDRESS LINE 2<input name="line2" maxlength="200" autocomplete="shipping address-line2"></label>
                </form>
                <a class="quiet-link" href="account.html">MANAGE SAVED ADDRESSES</a>
            </div>
            <div id="pickup-panel" class="address-list hidden"></div>
            <p id="shipping-quote" class="form-status"></p>
        </section>
        <button id="place-order" class="buy-button" type="button" disabled>PLACE ORDER</button>
        <p id="checkout-status" class="form-status" aria-live="polite"></p>
    </main>
    <script src="api.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
